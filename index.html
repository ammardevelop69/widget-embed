<body>
  <h1>Page with Kogents Chat Widget</h1>

<!-- Begin AutobotX Chat Widget -->
<script type="text/javascript">
  window.abxChat ||
    (function (d, s, id) {
      var w = (window.abxChat = function (c) {
        w._.push(c);
      });
      w._ = [];
      var e = d.createElement(s);
      e.async = true;
      e.id = id;
      e.src = "https://agent-builder.autobotx.ai/widget/embed.js?key=cmmczzt1y01b1ph07h2cir28i";
      var t = d.getElementsByTagName(s)[0];
      t.parentNode.insertBefore(e, t);
    })(document, "script", "autobotx-chat-widget");
</script>
<!-- End AutobotX Chat Widget -->
</body>
