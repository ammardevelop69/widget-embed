<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kogents Chat Widget</title>
</head>

<body>
  <h1>Page with Kogents Chat Widget</h1>
  <p>The chat widget should load in the corner. Configure or open it via the widget UI.</p>

  <!-- Begin Kogents Chat Widget -->
<script type="text/javascript">
  window.KogentsChat ||
    (function (d, s, id) {
      var w = (window.KogentsChat = function (c) {
        w._.push(c);
      });
      w._ = [];
      var e = d.createElement(s);
      e.async = true;
      e.id = id;
      e.src = "https://api-staging.kogents.com/widget/embed.js?key=03e1e647-90c3-4e0f-b790-2d4de1570cad&chatbotId=609c7aa3-81c9-4c38-9801-0aaf9b605155";
      var t = d.getElementsByTagName(s)[0];
      t.parentNode.insertBefore(e, t);
    })(document, "script", "kogents-chat-widget");
</script>
<!-- End Kogents Chat Widget -->
</body>

</html>
